<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Your Problem | Find your solution Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; scroll-behavior: smooth; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #e2e8f0; }
        .typing-cursor::after { content: "|"; animation: blink 0.7s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        
        .modal-overlay { 
            background: rgba(15, 23, 42, 0.7); 
            backdrop-filter: blur(8px); 
            display: none; 
            position: fixed; 
            inset: 0; 
            z-index: 50; 
            align-items: center; 
            justify-content: center; 
            padding: 1rem; 
        }
        .modal-active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .row-entry { animation: fadeInUp 0.5s ease forwards; transition: all 0.2s ease; }
        .copy-btn:active { transform: scale(0.9); }
    </style>
</head>
<body class="text-slate-800">

    <nav class="sticky top-0 z-40 glass">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex items-center gap-3">
                    <div class="bg-indigo-600 p-2.5 rounded-xl shadow-indigo-200 shadow-lg">
                        <i data-lucide="terminal" class="text-white w-6 h-6"></i>
                    </div>
                    <span class="text-2xl font-bold tracking-tight text-slate-900">LogYour<span class="text-indigo-600">Problem</span></span>
                </div>
                <button onclick="openModal('entryModal')" class="bg-indigo-600 text-white px-7 py-3 rounded-xl hover:bg-indigo-700 transition-all shadow-lg flex items-center gap-2 font-semibold">
                    <i data-lucide="plus" class="w-5 h-5"></i> Log New Problem
                </button>
            </div>
        </div>
    </nav>

    <header class="pt-20 pb-12 px-4 text-center bg-white">
        <h1 class="text-5xl font-extrabold text-slate-900 mb-4 tracking-tight">
            Solving problems for <br>
            <span id="typing-text" class="text-indigo-600 typing-cursor"></span>
        </h1>
        <div class="max-w-3xl mx-auto relative mt-10">
            <i data-lucide="search" class="absolute left-5 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
            <input type="text" id="searchInput" placeholder="Search by keyword (e.g. 'Server', 'UI', 'Database')..." 
                class="w-full pl-14 pr-6 py-5 rounded-2xl border-2 border-slate-100 focus:border-indigo-500 outline-none shadow-xl shadow-slate-200/40 transition-all text-lg">
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 mt-8">
        <div class="grid grid-cols-12 gap-0 px-8 py-4 bg-slate-900 text-white rounded-t-2xl text-xs font-bold uppercase tracking-widest">
            <div class="col-span-4 border-r border-slate-700 flex items-center gap-2">Problem Detail</div>
            <div class="col-span-8 pl-6 flex items-center gap-2">Technical Solution</div>
        </div>
        
        <main id="log-container" class="bg-slate-50 border border-t-0 border-slate-200 rounded-b-2xl mb-20 overflow-hidden">
            </main>

        <div id="noResults" class="hidden text-center py-20 bg-white rounded-b-2xl border border-slate-200">
            <i data-lucide="search-x" class="w-12 h-12 text-slate-300 mx-auto mb-4"></i>
            <p class="text-slate-500">No matching logs found.</p>
        </div>
    </div>

    <div id="entryModal" class="modal-overlay">
        <div class="bg-white w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden animate__animated animate__zoomIn">
            <div class="p-10">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-3xl font-bold text-slate-900">New Log Entry</h2>
                    <button onclick="closeModal('entryModal')" class="text-slate-400 hover:text-slate-900 transition"><i data-lucide="x" class="w-8 h-8"></i></button>
                </div>
                <form id="problemForm" class="space-y-6">
                    <input id="formTitle" required type="text" placeholder="Problem Title" class="w-full p-4 rounded-xl border border-slate-200 focus:border-indigo-500 outline-none">
                    <input id="formName" required type="text" placeholder="Your Name" class="w-full p-4 rounded-xl border border-slate-200 focus:border-indigo-500 outline-none">
                    <textarea id="formSolution" required rows="5" placeholder="Step-by-step fix..." class="w-full p-4 rounded-xl border border-slate-200 focus:border-indigo-500 outline-none"></textarea>
                    <button type="submit" id="submitBtn" class="w-full bg-indigo-600 text-white font-bold py-5 rounded-2xl hover:bg-indigo-700 transition shadow-lg">Commit to Database</button>
                </form>
            </div>
        </div>
    </div>

    <div id="statusModal" class="modal-overlay">
        <div class="bg-white w-full max-w-sm rounded-3xl shadow-2xl p-8 text-center animate__animated animate__bounceIn">
            <div id="statusIcon" class="mx-auto w-16 h-16 rounded-full flex items-center justify-center mb-4"></div>
            <h3 id="statusTitle" class="text-xl font-bold mb-2"></h3>
            <p id="statusMsg" class="text-slate-500 mb-6"></p>
            <button onclick="closeModal('statusModal')" class="w-full py-3 bg-slate-900 text-white rounded-xl font-bold">Close</button>
        </div>
    </div>

    <footer class="bg-slate-900 text-slate-400 pt-20 pb-10 px-6">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center border-b border-slate-800 pb-10 mb-10 gap-8">
            <div class="flex items-center gap-2 text-white text-2xl font-bold uppercase tracking-tight">
                <i data-lucide="terminal" class="text-indigo-400"></i> LogYourProblem
            </div>
            <div class="flex gap-10 text-sm font-semibold">
                <a href="#" class="hover:text-indigo-400 transition">Infrastructure</a>
                <a href="#" class="hover:text-indigo-400 transition">Security</a>
                <a href="#" class="hover:text-indigo-400 transition">API docs</a>
            </div>
        </div>
        <div class="max-w-7xl mx-auto flex justify-between items-center text-xs uppercase tracking-widest font-bold">
            <p>&copy; 2026 TechCorp Internal Engineering Hub.</p>
            <div class="flex gap-6"><a href="#">Privacy</a><a href="#">Terms</a></div>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBTTk13Wk1B0RmoRoioKMO_ASD5lntvIz8",
            authDomain: "disability-ae050.firebaseapp.com",
            databaseURL: "https://disability-ae050-default-rtdb.firebaseio.com",
            projectId: "disability-ae050",
            storageBucket: "disability-ae050.firebasestorage.app",
            messagingSenderId: "700458300236",
            appId: "1:700458300236:web:b36ea4dec89f469d0115e9",
            measurementId: "G-RPS83BL4RS"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const logsRef = ref(database, 'problem_logs');

        lucide.createIcons();

        // Typing Effect
        const textElement = document.getElementById('typing-text');
        const phrases = ["future developers.", "your teammates.", "tomorrow's self."];
        let pIndex = 0, cIndex = 0, isDeleting = false;
        function type() {
            const current = phrases[pIndex];
            textElement.textContent = isDeleting ? current.substring(0, cIndex - 1) : current.substring(0, cIndex + 1);
            cIndex = isDeleting ? cIndex - 1 : cIndex + 1;
            if (!isDeleting && cIndex === current.length) { isDeleting = true; setTimeout(type, 2000); }
            else if (isDeleting && cIndex === 0) { isDeleting = false; pIndex = (pIndex + 1) % phrases.length; setTimeout(type, 500); }
            else setTimeout(type, isDeleting ? 50 : 100);
        }
        type();

        window.openModal = (id) => document.getElementById(id).classList.add('modal-active');
        window.closeModal = (id) => document.getElementById(id).classList.remove('modal-active');

        function showStatus(success, title, msg) {
            const icon = document.getElementById('statusIcon');
            icon.innerHTML = success ? '<i data-lucide="check-circle" class="text-green-600"></i>' : '<i data-lucide="alert-triangle" class="text-red-600"></i>';
            icon.className = `mx-auto w-16 h-16 rounded-full flex items-center justify-center mb-4 ${success ? 'bg-green-100' : 'bg-red-100'}`;
            document.getElementById('statusTitle').innerText = title;
            document.getElementById('statusMsg').innerText = msg;
            lucide.createIcons();
            openModal('statusModal');
        }

        // Render Split Row
        function renderRow(title, name, solution, date) {
            const container = document.getElementById('log-container');
            const row = document.createElement('div');
            row.className = "grid grid-cols-12 gap-0 border-b border-slate-200 row-entry search-item";
            row.dataset.keyword = title.toLowerCase();
            
            row.innerHTML = `
                <div class="col-span-4 p-8 bg-slate-50/50 border-r border-slate-200">
                    <h3 class="text-xl font-bold text-slate-900 leading-tight mb-4">${title}</h3>
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-slate-900 text-white flex items-center justify-center text-[10px] font-bold">${name.charAt(0).toUpperCase()}</div>
                        <div>
                            <p class="text-xs font-bold text-slate-700">${name}</p>
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-tighter">${date}</p>
                        </div>
                    </div>
                </div>
                <div class="col-span-8 p-8 bg-white relative group">
                    <button onclick="copyText(this, \`${solution.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`)" 
                            class="copy-btn absolute top-4 right-4 p-2 bg-slate-100 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-all opacity-0 group-hover:opacity-100 flex items-center gap-2 text-xs font-bold">
                        <i data-lucide="copy" class="w-4 h-4"></i> Copy Solution
                    </button>
                    <p class="text-slate-600 text-sm leading-relaxed whitespace-pre-line">${solution}</p>
                </div>`;
            container.insertBefore(row, container.firstChild);
            lucide.createIcons();
        }

        // Copy Function
        window.copyText = (btn, text) => {
            navigator.clipboard.writeText(text).then(() => {
                const original = btn.innerHTML;
                btn.innerHTML = `<i data-lucide="check" class="w-4 h-4 text-green-600"></i> <span class="text-green-600">Copied!</span>`;
                lucide.createIcons();
                setTimeout(() => { btn.innerHTML = original; lucide.createIcons(); }, 2000);
            });
        };

        onChildAdded(logsRef, (data) => {
            const log = data.val();
            renderRow(log.title, log.name, log.solution, log.timestamp);
        });

        document.getElementById('problemForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "Syncing...";

            const newLog = {
                title: document.getElementById('formTitle').value,
                name: document.getElementById('formName').value,
                solution: document.getElementById('formSolution').value,
                timestamp: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
            };

            push(logsRef, newLog).then(() => {
                btn.disabled = false;
                btn.innerText = "Commit to Database";
                closeModal('entryModal');
                document.getElementById('problemForm').reset();
                showStatus(true, "Log Created", "Solution is now available for the whole team.");
            }).catch(() => {
                btn.disabled = false;
                btn.innerText = "Commit to Database";
                showStatus(false, "Connection Error", "Check your internet and try again.");
            });
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const rows = document.querySelectorAll('.search-item');
            let found = false;
            rows.forEach(row => {
                const match = row.dataset.keyword.includes(term);
                row.style.display = match ? 'grid' : 'none';
                if(match) found = true;
            });
            document.getElementById('noResults').style.display = found ? 'none' : 'block';
        });
    </script>
</body>
</html>
