<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Your Problem | find Your solution portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease, color 0.3s ease; }
        .glass { backdrop-filter: blur(10px); }
        .typing-cursor::after { content: "|"; animation: blink 0.7s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        
        /* Pill Shapes & Animations */
        .pill-button { border-radius: 9999px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .pill-button:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4); }

        .pill-search { border-radius: 9999px; transition: all 0.3s ease; }
        .pill-search:hover, .pill-search:focus { transform: scale(1.01); border-color: #6366f1; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }

        .modal-overlay { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px); display: none; position: fixed; inset: 0; z-index: 50; align-items: center; justify-content: center; padding: 1rem; }
        .modal-active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .row-entry { animation: fadeInUp 0.5s ease forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-slate-200">

    <nav class="sticky top-0 z-40 glass bg-white/90 border-b border-slate-200 dark:bg-slate-900/90 dark:border-slate-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex items-center gap-3">
                    <div class="bg-indigo-600 p-2.5 rounded-xl shadow-lg">
                        <i data-lucide="terminal" class="text-white w-6 h-6"></i>
                    </div>
                    <span class="text-2xl font-bold tracking-tight dark:text-white">LogYour<span class="text-indigo-600">Problem</span></span>
                </div>
                
                <div class="flex items-center gap-4">
                    <button onclick="toggleDarkMode()" class="p-3 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                        <i data-lucide="sun" id="sun-icon" class="hidden dark:block text-yellow-400"></i>
                        <i data-lucide="moon" id="moon-icon" class="block dark:hidden text-slate-600"></i>
                    </button>
                    <button onclick="openModal('entryModal')" class="pill-button bg-indigo-600 text-white px-8 py-3.5 shadow-lg flex items-center gap-2 font-semibold active:scale-95">
                        <i data-lucide="plus" class="w-5 h-5"></i> Log New Problem
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <header class="pt-20 pb-12 px-4 text-center bg-white dark:bg-slate-900 border-b dark:border-slate-800">
        <h1 class="text-5xl font-extrabold mb-4 tracking-tight dark:text-white">
            Solving problems for <br>
            <span id="typing-text" class="text-indigo-600 typing-cursor"></span>
        </h1>
        <div class="max-w-3xl mx-auto relative mt-10">
            <i data-lucide="search" class="absolute left-7 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
            <input type="text" id="searchInput" placeholder="Search by keyword..." 
                class="pill-search w-full pl-16 pr-8 py-5 border-2 border-slate-100 dark:border-slate-800 dark:bg-slate-800 outline-none shadow-xl shadow-slate-200/40 dark:shadow-none text-lg">
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 mt-8">
        <div class="grid grid-cols-12 gap-0 px-8 py-4 bg-slate-900 text-white rounded-t-2xl text-xs font-bold uppercase tracking-widest">
            <div class="col-span-4 border-r border-slate-700 flex items-center gap-2 text-indigo-400">Problem Detail</div>
            <div class="col-span-8 pl-6 flex items-center gap-2 text-green-400">Technical Solution</div>
        </div>
        
        <main id="log-container" class="bg-white dark:bg-slate-900 border border-t-0 border-slate-200 dark:border-slate-800 rounded-b-2xl mb-20 overflow-hidden min-h-[200px]">
            </main>
        
        <div id="noResults" class="hidden text-center py-20 bg-white dark:bg-slate-900 rounded-b-2xl border border-slate-200 dark:border-slate-800">
            <i data-lucide="search-x" class="w-12 h-12 text-slate-300 mx-auto mb-4"></i>
            <p class="text-slate-500">No matching logs found.</p>
        </div>
    </div>

    <div id="entryModal" class="modal-overlay">
        <div class="bg-white dark:bg-slate-900 w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden animate__animated animate__zoomIn">
            <div class="p-10">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-3xl font-bold dark:text-white">New Entry</h2>
                    <button onclick="closeModal('entryModal')" class="hover:text-red-500 transition dark:text-slate-400"><i data-lucide="x" class="w-8 h-8"></i></button>
                </div>
                <form id="problemForm" class="space-y-6">
                    <input id="formTitle" required type="text" placeholder="Problem Title" class="w-full p-4 rounded-xl border border-slate-200 dark:border-slate-700 dark:bg-slate-800 outline-none dark:text-white">
                    <input id="formName" required type="text" placeholder="Your Name" class="w-full p-4 rounded-xl border border-slate-200 dark:border-slate-700 dark:bg-slate-800 outline-none dark:text-white">
                    <textarea id="formSolution" required rows="5" placeholder="Detailed solution..." class="w-full p-4 rounded-xl border border-slate-200 dark:border-slate-700 dark:bg-slate-800 outline-none dark:text-white"></textarea>
                    <button type="submit" id="submitBtn" class="pill-button w-full bg-indigo-600 text-white font-bold py-5 shadow-lg">Commit Solution</button>
                </form>
            </div>
        </div>
    </div>

    <div id="statusModal" class="modal-overlay">
        <div class="bg-white dark:bg-slate-900 w-full max-w-sm rounded-3xl shadow-2xl p-8 text-center animate__animated animate__bounceIn">
            <div id="statusIcon" class="mx-auto w-16 h-16 rounded-full flex items-center justify-center mb-4"></div>
            <h3 id="statusTitle" class="text-xl font-bold mb-2 dark:text-white"></h3>
            <p id="statusMsg" class="text-slate-500 mb-6"></p>
            <button onclick="closeModal('statusModal')" class="pill-button w-full py-3 bg-slate-900 dark:bg-indigo-600 text-white font-bold">Dismiss</button>
        </div>
    </div>

    <footer class="bg-slate-900 py-16 px-6">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
            <div class="flex items-center gap-2 text-white text-xl font-bold uppercase tracking-tight">
                <i data-lucide="terminal" class="text-indigo-400"></i> LogYourProblem
            </div>
            <p class="text-xs tracking-widest uppercase font-bold text-slate-400">&copy; 2026 TechCorp Internal Engineering Hub.</p>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBTTk13Wk1B0RmoRoioKMO_ASD5lntvIz8",
            authDomain: "disability-ae050.firebaseapp.com",
            databaseURL: "https://disability-ae050-default-rtdb.firebaseio.com",
            projectId: "disability-ae050",
            storageBucket: "disability-ae050.firebasestorage.app",
            messagingSenderId: "700458300236",
            appId: "1:700458300236:web:b36ea4dec89f469d0115e9",
            measurementId: "G-RPS83BL4RS"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const logsRef = ref(database, 'problem_logs');

        lucide.createIcons();

        // Dark Mode Logic
        window.toggleDarkMode = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        };
        if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');

        // Typing effect
        const textElement = document.getElementById('typing-text');
        const phrases = ["future developers.", "your teammates.", "tomorrow's self."];
        let pIndex = 0, cIndex = 0, isDeleting = false;
        function type() {
            const current = phrases[pIndex];
            textElement.textContent = isDeleting ? current.substring(0, cIndex - 1) : current.substring(0, cIndex + 1);
            cIndex = isDeleting ? cIndex - 1 : cIndex + 1;
            if (!isDeleting && cIndex === current.length) { isDeleting = true; setTimeout(type, 2000); }
            else if (isDeleting && cIndex === 0) { isDeleting = false; pIndex = (pIndex + 1) % phrases.length; setTimeout(type, 500); }
            else setTimeout(type, isDeleting ? 50 : 100);
        }
        type();

        window.openModal = (id) => document.getElementById(id).classList.add('modal-active');
        window.closeModal = (id) => document.getElementById(id).classList.remove('modal-active');

        function showStatus(success, title, msg) {
            const icon = document.getElementById('statusIcon');
            icon.innerHTML = success ? '<i data-lucide="check-circle" class="text-green-600"></i>' : '<i data-lucide="alert-triangle" class="text-red-600"></i>';
            icon.className = `mx-auto w-16 h-16 rounded-full flex items-center justify-center mb-4 ${success ? 'bg-green-100' : 'bg-red-100'}`;
            document.getElementById('statusTitle').innerText = title;
            document.getElementById('statusMsg').innerText = msg;
            lucide.createIcons();
            openModal('statusModal');
        }

        function renderRow(title, name, solution, date) {
            const container = document.getElementById('log-container');
            const row = document.createElement('div');
            row.className = "grid grid-cols-12 gap-0 border-b border-slate-200 dark:border-slate-800 row-entry search-item bg-white dark:bg-slate-900";
            row.dataset.keyword = title.toLowerCase();
            
            row.innerHTML = `
                <div class="col-span-4 p-8 bg-slate-50/50 dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800">
                    <h3 class="text-xl font-bold text-slate-900 dark:text-white leading-tight mb-4">${title}</h3>
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center text-[10px] font-bold text-white">${name.charAt(0).toUpperCase()}</div>
                        <div>
                            <p class="text-xs font-bold text-slate-700 dark:text-slate-400">${name}</p>
                            <p class="text-[10px] text-slate-400 dark:text-slate-500 font-bold uppercase tracking-tighter">${date}</p>
                        </div>
                    </div>
                </div>
                <div class="col-span-8 p-8 bg-white dark:bg-slate-900 relative group">
                    <button onclick="copyText(this, \`${solution.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`)" 
                            class="copy-btn absolute top-4 right-4 p-2 bg-slate-100 dark:bg-slate-800 text-slate-400 hover:text-indigo-600 rounded-lg transition-all opacity-0 group-hover:opacity-100 flex items-center gap-2 text-xs font-bold">
                        <i data-lucide="copy" class="w-4 h-4"></i> Copy
                    </button>
                    <p class="text-slate-600 dark:text-slate-400 text-sm leading-relaxed whitespace-pre-line">${solution}</p>
                </div>`;
            
            container.insertBefore(row, container.firstChild);
            lucide.createIcons();
        }

        onChildAdded(logsRef, (data) => {
            const log = data.val();
            renderRow(log.title, log.name, log.solution, log.timestamp);
        });

        window.copyText = (btn, text) => {
            navigator.clipboard.writeText(text).then(() => {
                const original = btn.innerHTML;
                btn.innerHTML = `<i data-lucide="check" class="w-4 h-4 text-green-600"></i> <span class="text-green-600">Copied!</span>`;
                lucide.createIcons();
                setTimeout(() => { btn.innerHTML = original; lucide.createIcons(); }, 2000);
            });
        };

        document.getElementById('problemForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "Syncing...";

            const newLog = {
                title: document.getElementById('formTitle').value,
                name: document.getElementById('formName').value,
                solution: document.getElementById('formSolution').value,
                timestamp: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
            };

            push(logsRef, newLog).then(() => {
                btn.disabled = false;
                btn.innerText = "Commit Solution";
                closeModal('entryModal');
                document.getElementById('problemForm').reset();
                showStatus(true, "Published", "Fetched from Firebase successfully.");
            }).catch((err) => {
                btn.disabled = false;
                btn.innerText = "Commit Solution";
                showStatus(false, "Sync Error", err.message);
            });
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const rows = document.querySelectorAll('.search-item');
            let found = false;
            rows.forEach(row => {
                const match = row.dataset.keyword.includes(term);
                row.style.display = match ? 'grid' : 'none';
                if(match) found = true;
            });
            document.getElementById('noResults').style.display = found ? 'none' : 'block';
        });
    </script>
</body>
</html>
