<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Includify | Intelligent Accessibility</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');
        body { background: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }

        /* Neural Search Animation */
        .ai-glow { animation: neural-pulse 2s infinite; border-color: #6366f1 !important; }
        @keyframes neural-pulse {
            0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(99, 102, 241, 0); }
            100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
        }

        /* Floating AI Chatbot */
        #aiChatBot {
            position: fixed; bottom: 30px; right: 30px; z-index: 10000;
        }
        .chat-window {
            display: none; width: 350px; height: 450px; background: white;
            border-radius: 30px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.2);
            flex-direction: column; overflow: hidden; border: 1px solid #e2e8f0;
        }
        .chat-window.active { display: flex; }
        .message { padding: 10px 15px; border-radius: 15px; margin-bottom: 8px; max-width: 85%; font-size: 14px; }
        .bot-msg { background: #f1f5f9; color: #1e293b; align-self: flex-start; }
        .user-msg { background: #6366f1; color: white; align-self: flex-end; }

        .inclusion-card {
            background: white; border-radius: 40px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .inclusion-card:hover { transform: translateY(-10px); box-shadow: 0 30px 60px rgba(99, 102, 241, 0.1); }
    </style>
</head>
<body>

    <div class="fixed top-6 left-0 right-0 z-[1000] px-6">
        <nav class="container mx-auto max-w-5xl bg-white/70 backdrop-blur-md p-3 rounded-full flex justify-between items-center px-8 shadow-xl border border-white">
            <h1 class="text-2xl font-black text-indigo-900">INCLUDIFY<span class="text-indigo-500">.</span></h1>
            <a href="#contact" class="bg-indigo-600 text-white px-6 py-2 rounded-full text-xs font-bold shadow-lg">GET HELP</a>
        </nav>
    </div>

    <header class="pt-52 pb-20 px-6 text-center">
        <h2 class="text-5xl md:text-8xl font-black text-slate-900 leading-tight">
            Advancing <br> <span id="typewriter" class="text-indigo-600"></span>
        </h2>
        
        <div class="max-w-3xl mx-auto mt-12">
            <div id="searchBox" class="bg-white p-2 rounded-[35px] shadow-2xl flex items-center pr-4 border-2 border-transparent transition-all">
                <div class="pl-6 text-indigo-500 text-xl"><i class="fa-solid fa-microchip animate-pulse"></i></div>
                <input type="text" id="aiSearch" placeholder="Type a keyword (e.g. 'reading', 'social', 'movement')..." 
                class="w-full bg-transparent p-6 outline-none text-xl font-medium text-slate-700">
            </div>
        </div>
    </header>

    <main class="container mx-auto px-6 py-12">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10" id="cardGrid"></div>
    </main>

    <div id="aiChatBot">
        <div id="chatWindow" class="chat-window animate__animated animate__fadeInUp">
            <div class="bg-indigo-600 p-5 text-white flex justify-between items-center">
                <span class="font-bold"><i class="fa-solid fa-robot mr-2"></i> Includify AI</span>
                <button onclick="toggleChat()"><i class="fa-solid fa-chevron-down"></i></button>
            </div>
            <div id="chatMessages" class="flex-1 p-5 overflow-y-auto flex flex-col">
                <div class="message bot-msg">Hello! I'm the Includify Assistant. Ask me about Autism, Dyslexia, or CP!</div>
            </div>
            <div class="p-4 border-t flex gap-2">
                <input type="text" id="chatInput" placeholder="Ask AI..." class="flex-1 outline-none text-sm">
                <button onclick="sendChat()" class="text-indigo-600 p-2"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
        <button onclick="toggleChat()" class="bg-indigo-600 text-white w-16 h-16 rounded-full shadow-2xl flex items-center justify-center text-2xl hover:scale-110 transition">
            <i class="fa-solid fa-comment-dots"></i>
        </button>
    </div>

    <section id="contact" class="py-24 px-6">
        <div class="container mx-auto max-w-4xl bg-slate-900 rounded-[50px] p-12 text-white shadow-3xl">
            <h3 class="text-4xl font-black mb-6 text-center">Specialist Consultation</h3>
            <form id="contactForm" class="space-y-4 max-w-lg mx-auto">
                <input type="text" id="uName" placeholder="Name" required class="w-full p-4 rounded-xl bg-white/5 border border-white/10 outline-none focus:border-indigo-500">
                <input type="email" id="uEmail" placeholder="Email" required class="w-full p-4 rounded-xl bg-white/5 border border-white/10 outline-none focus:border-indigo-500">
                <textarea id="uMsg" placeholder="Inquiry..." rows="3" class="w-full p-4 rounded-xl bg-white/5 border border-white/10 outline-none focus:border-indigo-500"></textarea>
                <button type="submit" class="w-full bg-indigo-600 py-4 rounded-xl font-bold hover:bg-indigo-500 transition">SAVE TO DATABASE</button>
            </form>
            <p id="status" class="mt-4 text-center hidden"></p>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBTTk13Wk1B0RmoRoioKMO_ASD5lntvIz8",
            authDomain: "disability-ae050.firebaseapp.com",
            projectId: "disability-ae050",
            databaseURL: "https://disability-ae050-default-rtdb.firebaseio.com",
            appId: "1:700458300236:web:b36ea4dec89f469d0115e9"
        };
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // Typewriter
        new Typewriter('#typewriter', {
            strings: ['Inclusion.', 'Human Rights.', 'Equality.', 'Innovation.'],
            autoStart: true, loop: true,
        });

        const disabilities = [
            { id: 1, name: "Autism (ASD)", keywords: ["social", "brain", "speech", "behavior"], img: "https://images.unsplash.com/photo-1594608661623-aa0bd3a69d98?w=600", desc: "A neurodevelopmental condition impacting social interaction." },
            { id: 2, name: "Dyslexia", keywords: ["reading", "letters", "writing", "spelling"], img: "https://images.unsplash.com/photo-1503676260728-1c00da094a0b?w=600", desc: "A learning disability focusing on reading and phonological processing." },
            { id: 3, name: "Cerebral Palsy", keywords: ["movement", "physical", "motor", "muscles"], img: "https://images.unsplash.com/photo-1534723328310-e82dad3ee43f?w=600", desc: "A physical disability affecting movement and muscle coordination." }
        ];

        // Search & Render
        const grid = document.getElementById('cardGrid');
        const aiSearch = document.getElementById('aiSearch');
        function render(list) {
            grid.innerHTML = list.map(d => `
                <div class="inclusion-card p-6 shadow-lg animate__animated animate__zoomIn">
                    <img src="${d.img}" class="w-full h-48 object-cover rounded-3xl mb-4">
                    <h4 class="text-2xl font-black">${d.name}</h4>
                    <p class="text-gray-500 text-sm">${d.desc}</p>
                </div>
            `).join('');
        }
        render(disabilities);

        aiSearch.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            document.getElementById('searchBox').classList.toggle('ai-glow', query.length > 0);
            render(disabilities.filter(d => d.name.toLowerCase().includes(query) || d.keywords.some(k => k.includes(query))));
        });

        // Chatbot Logic
        window.toggleChat = () => document.getElementById('chatWindow').classList.toggle('active');
        window.sendChat = () => {
            const input = document.getElementById('chatInput');
            const box = document.getElementById('chatMessages');
            if (!input.value) return;

            // User Message
            box.innerHTML += `<div class="message user-msg">${input.value}</div>`;
            
            // AI Response Logic
            let reply = "I'm not sure about that. Try asking about Dyslexia or Autism!";
            const text = input.value.toLowerCase();
            if (text.includes("autism")) reply = "Autism (ASD) affects communication. Specialists suggest ABA therapy.";
            if (text.includes("reading") || text.includes("dyslexia")) reply = "Dyslexia impacts reading. Multisensory learning is a great school fit.";
            if (text.includes("help") || text.includes("support")) reply = "You can fill out the contact form below to get specialist help!";

            setTimeout(() => {
                box.innerHTML += `<div class="message bot-msg">${reply}</div>`;
                box.scrollTop = box.scrollHeight;
            }, 600);
            input.value = "";
        };

        // Firebase Logic
        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const s = document.getElementById('status');
            try {
                await push(ref(database, 'inquiries'), {
                    name: document.getElementById('uName').value,
                    email: document.getElementById('uEmail').value,
                    msg: document.getElementById('uMsg').value
                });
                s.innerText = "Logged to Firebase!"; s.className = "mt-4 text-green-400 block";
                e.target.reset();
            } catch(e) { s.innerText = "Error!"; s.className = "mt-4 text-red-400 block"; }
        });
    </script>
</body>
</html>
